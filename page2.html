<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - Favorites</title>
    <style>
        :root {
            --rbx-bg: #F2F4F5;
            --rbx-header: #FFFFFF;
            --rbx-text: #393B3D;
            --rbx-blue: #00A2FF;
            --rbx-border: #CED1D1;
        }

        body {
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--rbx-bg);
            margin: 0;
            color: var(--rbx-text);
        }

        /* BIGGER HEADER */
        .navbar {
            background-color: var(--rbx-header);
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: space-between; 
            padding: 0 50px; 
            border-bottom: 1px solid var(--rbx-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { 
            font-weight: 900; 
            font-size: 40px; 
            letter-spacing: -2px; 
            text-decoration: none;
            color: black;
        }

        .nav-links a { 
            text-decoration: none; 
            color: var(--rbx-text); 
            font-weight: 600; 
            font-size: 22px;
            margin-left: 25px;
        }

        .content-wrapper {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }

        #favorites-section {
            background: white;
            border: 1px solid var(--rbx-border);
            border-radius: 12px;
            padding: 40px;
        }

        #favorites-section h2 { font-size: 32px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .game-link { text-decoration: none; color: inherit; }

        .game-card {
            background: #FFFFFF;
            border: 1px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.15s;
        }

        .game-card:hover {
            transform: scale(1.05);
            border-color: var(--rbx-blue);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .game-thumb img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
        }

        .game-info {
            padding: 15px;
            font-weight: 700;
            font-size: 18px;
        }

        .header-profile { display: flex; align-items: center; gap: 15px; }
        .user-name-top { font-weight: 700; font-size: 20px; }
        .user-avatar-mini { width: 55px; height: 55px; border-radius: 50%; overflow: hidden; border: 1px solid #ccc; }
        .user-avatar-mini img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="display: flex; align-items: center;">
            <a href="homepage.html" class="logo">ROBLOX</a>
            <div class="nav-links">
                <a href="homepage.html">Home</a>
                <a href="favgames.html" style="color: var(--rbx-blue);">Favorite Games</a>
            </div>
        </div>
        <div class="header-profile">
            <span class="user-name-top">SHAdowBYTE</span>
            <div class="user-avatar-mini">
                <img src="avatar.jpg" alt="User">
            </div>
        </div>
    </nav>

    <div class="content-wrapper">
        <div id="favorites-section">
            <h2 style="margin: 0;">My Favorite Games</h2>
            <p style="color: #65676B; font-size: 18px;">List of games you frequently play.</p>
            
            <div class="grid">
                <a href="https://www.roblox.com/games/9872472334/Evade" class="game-link" target="_blank">
                    <div class="game-card">
                        <div class="game-thumb"><img src="riblox.evade.jpg" alt="Evade"></div>
                        <div class="game-info">EVADE</div>
                    </div>
                </a>

                <a href="https://www.roblox.com/games/2753915549/BLOX-FRUITS" class="game-link" target="_blank">
                    <div class="game-card">
                        <div class="game-thumb"><img src="riblox.bloxf.webp" alt="Blox Fruits"></div>
                        <div class="game-info">Blox Fruits</div>
                    </div>
                </a>

                <a href="https://www.roblox.com/games/10449761463/The-Strongest-Battlegrounds" class="game-link" target="_blank">
                    <div class="game-card">
                        <div class="game-thumb"><img src="riblox.battle.jpg" alt="Battlegrounds"></div>
                        <div class="game-info">The Strongest Battle...</div>
                    </div>
                </a>

                <a href="https://www.roblox.com/games/189707/Natural-Disaster-Survival" class="game-link" target="_blank">
                    <div class="game-card">
                        <div class="game-thumb"><img src="riblox.survival.webp" alt="Survival"></div>
                        <div class="game-info">Natural Disaster...</div>
                    </div>
                </a>

                <a href="https://www.roblox.com/games/142823291/Murder-Mystery-2" class="game-link" target="_blank">
                    <div class="game-card">
                        <div class="game-thumb"><img src="riblox.2w.webp" alt="MM2"></div>
                        <div class="game-info">Murder Mystery 2</div>
                    </div>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
